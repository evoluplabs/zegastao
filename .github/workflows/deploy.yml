name: Deploy Zé Gastão

on:
  push:
    branches: [main]

jobs:
  functions-build:
    name: Functions — build e testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zegastao-main/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zegastao-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: zegastao-main/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_FEATURE_ZE_APOSTADOR: "true"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: zegastao-main/dist/
          retention-days: 1

  firebase-deploy:
    name: Deploy para Firebase
    runs-on: ubuntu-latest
    needs: [functions-build, frontend-build]
    defaults:
      run:
        working-directory: zegastao-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: zegastao-main/package-lock.json
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: zegastao-main/dist/
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Install functions dependencies
        working-directory: zegastao-main/functions
        run: npm install
      - name: Create functions environment file
        working-directory: zegastao-main/functions
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          MP_WEBHOOK_SECRET: ${{ secrets.MP_WEBHOOK_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}" > .env
          echo "MP_ACCESS_TOKEN=${MP_ACCESS_TOKEN}" >> .env
          echo "MP_WEBHOOK_SECRET=${MP_WEBHOOK_SECRET}" >> .env
          echo "SENTRY_DSN=${SENTRY_DSN}" >> .env
          echo "API_FOOTBALL_KEY=${API_FOOTBALL_KEY}" >> .env
          echo "ODDS_API_KEY=${ODDS_API_KEY}" >> .env
          echo "ZE_APOSTADOR_ENABLED=true" >> .env
          echo "ZE_WEB_SEARCH_ENABLED=true" >> .env
          echo "ZE_KARMA_ENABLED=false" >> .env
      - name: Build functions
        working-directory: zegastao-main/functions
        run: npm run build
      - name: Deploy Hosting + Functions + Firestore rules
        run: |
          firebase deploy \
            --only hosting,functions,firestore:rules \
            --project ${{ secrets.FIREBASE_PROJECT_ID }} \
            --token ${{ secrets.FIREBASE_TOKEN }}
